<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>树屋庭院</title>
<style>
/* ============================================
   树屋庭院 — Enchanted Papercraft Design System
   ============================================ */

/* ----- Design Tokens ----- */
:root {
  --ink:       #2C2420;
  --ink-light: #5C4A42;
  --ink-muted: #8B7B72;
  --paper:     #FDF9F2;
  --paper-2:   #F8F2E8;
  --paper-3:   #F2E8D8;
  --cream:     #FFFAF4;
  --chocolate: #4A3226;
  --caramel:   #C87D3E;
  --honey:     #E0B060;
  --honey-light:#F0D090;
  --rose:      #C47A6E;
  --rose-light:#E8C0B8;
  --sage:      #6B8B6D;
  --sage-light:#A0C0A2;
  --moss:      #4A6B4C;
  --chalkboard:#2A3E2A;
  --chalk-w:   #F0ECD8;
  --chalk-o:   #FFA060;
  --frame-wood:#6B4226;
  --gold:      #C8A050;
  --gold-light:#E8D090;

  --font-display: 'STKaiti','KaiTi','楷体','Noto Serif SC','Songti SC',serif;
  --font-body:    'STKaiti','KaiTi','楷体','Noto Serif SC','Songti SC',serif;
  --font-decor:   'Georgia','Times New Roman',serif;

  --shadow-sm:    0 1px 3px rgba(44,36,32,0.06), 0 1px 2px rgba(44,36,32,0.04);
  --shadow-md:    0 3px 16px rgba(44,36,32,0.08), 0 1px 4px rgba(44,36,32,0.04);
  --shadow-lg:    0 6px 32px rgba(44,36,32,0.12), 0 2px 8px rgba(44,36,32,0.06);
  --shadow-xl:    0 12px 48px rgba(44,36,32,0.16), 0 4px 16px rgba(44,36,32,0.08);
  --shadow-glow:  0 0 40px rgba(200,128,60,0.25), 0 0 80px rgba(200,160,80,0.12);
  --shadow-inner: inset 0 2px 8px rgba(0,0,0,0.08);

  --radius-sm: 6px;
  --radius-md: 14px;
  --radius-lg: 24px;
  --radius-xl: 32px;

  --ease-out:   cubic-bezier(0.16,1,0.3,1);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-in-out: cubic-bezier(0.65,0,0.35,1);
}

/* ----- Reset ----- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--paper);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
button,input,textarea{font-family:inherit;font-size:inherit;color:inherit;border:none;background:none;outline:none}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
textarea{resize:none;display:block}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}

/* ----- App Shell ----- */
#app{
  width:100%;
  min-height:100vh;min-height:100dvh;
  position:relative;
  overflow-x:hidden;
}
@media(min-width:480px){
  #app{
    max-width:430px;
    margin:0 auto;
    box-shadow:0 0 80px rgba(44,36,32,0.15);
    border-left:1px solid rgba(0,0,0,0.04);
    border-right:1px solid rgba(0,0,0,0.04);
  }
}

/* ----- View Management ----- */
.view{position:absolute;top:0;left:0;width:100%;min-height:100vh;min-height:100dvh;opacity:0;pointer-events:none;transition:opacity .35s var(--ease-out)}
.view.active{position:relative;opacity:1;pointer-events:auto;z-index:1}
.view.fade-out{opacity:0;transition:opacity .2s var(--ease-out)}

/* ============================================
   SHARED COMPONENTS
   ============================================ */

/* Paper texture background */
.paper-bg{
  background:
    linear-gradient(180deg,var(--cream) 0%,var(--paper) 30%,var(--paper-2) 100%);
  position:relative;
}
.paper-bg::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  background-size:256px;
  opacity:0.5;
}

/* Back button */
.back-btn{
  position:fixed;top:max(20px,env(safe-area-inset-top,20px));left:16px;z-index:50;
  display:inline-flex;align-items:center;gap:4px;
  padding:8px 16px;
  background:rgba(255,255,255,0.75);backdrop-filter:blur(8px);
  border-radius:var(--radius-full);
  font-size:14px;color:var(--ink-light);
  box-shadow:var(--shadow-sm);
  transition:all .25s var(--ease-out);
}
.back-btn:hover{background:rgba(255,255,255,0.9);box-shadow:var(--shadow-md)}
.back-btn:active{transform:scale(0.96)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 28px;border-radius:var(--radius-full);
  font-size:15px;font-weight:600;
  transition:all .3s var(--ease-out);
  position:relative;overflow:hidden;
}
.btn-primary{
  background:linear-gradient(135deg,var(--caramel) 0%,#B87030 100%);
  color:#FFF;box-shadow:0 2px 12px rgba(200,125,60,0.3);
}
.btn-primary:hover{box-shadow:0 4px 20px rgba(200,125,60,0.45)}
.btn-primary:active{transform:scale(0.97);box-shadow:0 1px 6px rgba(200,125,60,0.3)}

.btn-outline{
  background:transparent;color:var(--caramel);
  border:1.5px solid var(--caramel);
}
.btn-outline:hover{background:rgba(200,125,60,0.06)}
.btn-outline:active{transform:scale(0.97)}

.btn-ghost{color:var(--ink-muted);padding:8px 16px;font-weight:400}
.btn-ghost:hover{color:var(--ink-light);background:rgba(0,0,0,0.03)}

.btn-sage{background:linear-gradient(135deg,var(--sage) 0%,var(--moss) 100%);color:#FFF;box-shadow:0 2px 12px rgba(107,139,109,0.3)}
.btn-sage:hover{box-shadow:0 4px 20px rgba(107,139,109,0.45)}
.btn-sage:active{transform:scale(0.97)}

.btn-sm{padding:8px 18px;font-size:13px}
.btn-lg{padding:16px 36px;font-size:17px}

/* Toast */
#toast{
  position:fixed;top:max(60px,env(safe-area-inset-top,60px));left:50%;transform:translateX(-50%) translateY(-20px);
  z-index:999;
  padding:10px 24px;border-radius:var(--radius-full);
  background:var(--ink);color:#FFF;
  font-size:14px;box-shadow:var(--shadow-lg);
  opacity:0;transition:all .35s var(--ease-out);
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--moss)}
#toast.error{background:var(--rose)}

/* Modal overlay */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(44,36,32,0.5);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s var(--ease-out);
}
.modal-overlay.open{opacity:1;pointer-events:auto}

.modal-sheet{
  background:var(--paper);
  border-radius:var(--radius-xl);
  padding:28px 24px;
  width:calc(100% - 48px);max-width:380px;
  box-shadow:var(--shadow-xl),0 0 0 1px rgba(0,0,0,0.04);
  transform:translateY(12px) scale(0.97);
  transition:transform .4s var(--ease-spring);
}
.modal-overlay.open .modal-sheet{transform:translateY(0) scale(1)}

.modal-title{font-size:18px;font-weight:700;color:var(--chocolate);margin-bottom:16px;display:block}
.modal-textarea{
  width:100%;min-height:140px;
  background:var(--paper-2);border-radius:var(--radius-md);
  padding:14px 16px;font-size:15px;line-height:1.7;
  border:1px solid transparent;
  transition:border-color .25s,border-color .25s;
}
.modal-textarea:focus{border-color:var(--caramel);background:var(--cream)}
.modal-btns{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px;text-align:center;
}
.empty-icon{font-size:64px;margin-bottom:12px;opacity:0.7}
.empty-title{font-size:16px;color:var(--ink-light);margin-bottom:4px}
.empty-desc{font-size:13px;color:var(--ink-muted)}

/* Loading */
.loading-inline{
  display:flex;flex-direction:column;align-items:center;padding:60px 20px;
  color:var(--ink-muted);font-size:14px;gap:12px;
}
.spinner{
  width:28px;height:28px;border:2.5px solid var(--paper-3);
  border-top-color:var(--caramel);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============================================
   PAGE 0 — LOGIN
   ============================================ */
#view-login{
  background:linear-gradient(175deg,#F5EDE0 0%,#EDE0D0 40%,#E5D5C0 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;min-height:100vh;min-height:100dvh;
  position:relative;overflow:hidden;
}
#view-login::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 30%,rgba(232,184,96,0.15) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 70%,rgba(196,122,110,0.08) 0%,transparent 50%),
             radial-gradient(ellipse at 20% 60%,rgba(107,139,109,0.06) 0%,transparent 50%);
}
#view-login::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.025'/%3E%3C/svg%3E");
  background-size:200px;
}

.login-inner{position:relative;z-index:1;width:100%;max-width:340px;text-align:center}

/* Hero */
.login-hero{margin-bottom:44px}
.login-tree{font-size:72px;display:block;margin-bottom:8px;animation:treeFloat 3s ease-in-out infinite}
@keyframes treeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.login-title{font-size:32px;font-weight:700;color:var(--chocolate);font-family:var(--font-display);letter-spacing:2px}
.login-sub{
  font-size:14px;color:var(--ink-muted);margin-top:6px;
  font-family:var(--font-decor);font-style:italic;letter-spacing:0.5px;
}

/* Decorative divider */
.login-divider{
  width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--caramel),transparent);
  margin:0 auto 36px;opacity:0.5;
}

/* Role cards */
.role-cards{display:flex;gap:14px;margin-bottom:28px}
.role-card{
  flex:1;padding:28px 14px 22px;border-radius:var(--radius-lg);
  background:var(--cream);cursor:pointer;
  box-shadow:var(--shadow-sm);
  border:2px solid transparent;
  transition:all .35s var(--ease-out);
  position:relative;text-align:center;
}
.role-card:hover{border-color:rgba(200,128,60,0.3);box-shadow:var(--shadow-md)}
.role-card.selected{
  border-color:var(--caramel);
  box-shadow:var(--shadow-glow),0 0 0 4px rgba(200,128,60,0.08);
  background:linear-gradient(135deg,#FFF8EF 0%,#FFF3E4 100%);
}
.role-emoji{font-size:52px;display:block;margin-bottom:10px;transition:transform .35s var(--ease-spring)}
.role-card.selected .role-emoji{transform:scale(1.15)}
.role-name{font-size:15px;font-weight:600;color:var(--chocolate);display:block}
.role-card.selected .role-name{color:var(--caramel)}
.role-check{
  position:absolute;top:10px;right:14px;
  width:22px;height:22px;border-radius:50%;
  background:var(--caramel);color:#FFF;
  font-size:13px;display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0);
  transition:all .35s var(--ease-spring);
}
.role-card.selected .role-check{opacity:1;transform:scale(1)}

/* Password field */
.pwd-wrap{
  overflow:hidden;max-height:0;opacity:0;
  transition:all .45s var(--ease-out);
  margin-bottom:0;
}
.pwd-wrap.visible{max-height:200px;opacity:1;margin-bottom:24px}
.pwd-input{
  width:100%;padding:14px 18px;
  background:var(--cream);border-radius:var(--radius-full);
  border:1.5px solid var(--paper-3);
  font-size:16px;text-align:center;letter-spacing:4px;
  color:var(--ink);
  transition:all .25s;
}
.pwd-input:focus{border-color:var(--caramel);box-shadow:0 0 0 4px rgba(200,128,60,0.06)}
.pwd-input::placeholder{color:var(--ink-muted);letter-spacing:0;font-size:14px}

/* Login button */
.login-btn-wrap{opacity:0;transform:translateY(8px);transition:all .45s var(--ease-out);pointer-events:none}
.login-btn-wrap.visible{opacity:1;transform:translateY(0);pointer-events:auto}

/* Error */
.login-error{
  margin-top:12px;font-size:13px;color:var(--rose);
  opacity:0;transition:opacity .3s;
}
.login-error.show{opacity:1}

/* ============================================
   PAGE 1 — COURTYARD (HOME)
   ============================================ */
#view-home{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#2d3561}
.scene-bg{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;z-index:1;
}

.sky-indicator{position:absolute;top:max(6%,env(safe-area-inset-top,6%));right:8%;z-index:10;font-size:42px;filter:drop-shadow(0 0 10px rgba(255,215,0,0.5))}

.actor{position:absolute;z-index:5;pointer-events:none}
.actor.rabbit{top:38%;left:50%;width:27vw;max-width:130px;aspect-ratio:1;object-fit:contain}
.actor.fox{top:38%;left:65%;width:27vw;max-width:130px;aspect-ratio:1;object-fit:contain}

.mailbox{position:absolute;z-index:8}
.mailbox img{width:100%;height:auto;display:block}
.mailbox.white{bottom:20%;left:15%;width:24vw;max-width:110px}
.mailbox.orange{bottom:20%;right:16%;width:24vw;max-width:110px}
/* Unread flag animation */
.mailbox-has-mail{animation:flagWave 1.2s ease-in-out infinite}
@keyframes flagWave{0%,100%{transform:rotate(0)}25%{transform:rotate(2deg)}75%{transform:rotate(-2deg)}}
.mail-new-dot{
  position:absolute;top:-4px;right:-4px;width:14px;height:14px;
  background:var(--rose);border-radius:50%;border:2px solid #FFF;
  box-shadow:0 0 8px rgba(196,122,110,0.6);
}

/* Hitboxes */
.hitbox{position:absolute;z-index:6;cursor:pointer}
.hitbox:active{filter:brightness(1.2)}
.door-hitbox{top:38%;left:50%;transform:translateX(-50%);width:19vw;max-width:90px;height:27vw;max-height:130px}
.sign-hitbox{top:55%;left:28%;width:13vw;max-width:64px;height:12vw;max-height:58px}
.treehole-hitbox{top:65%;left:40%;width:13vw;max-width:64px;height:24vw;max-height:116px}

/* Inbox/outbox labels */
.mailbox-label{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,0.7);
  white-space:nowrap;pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,0.3);
}

/* User indicator */
.user-chip{
  position:absolute;top:max(6%,env(safe-area-inset-top,6%));left:16px;z-index:10;
  padding:6px 14px;border-radius:var(--radius-full);
  background:rgba(255,255,255,0.25);backdrop-filter:blur(8px);
  font-size:13px;color:#FFF;text-shadow:0 1px 2px rgba(0,0,0,0.2);
}

/* Logout link (subtle, bottom center of courtyard) */
.logout-link{
  position:absolute;bottom:max(12px,env(safe-area-inset-bottom,12px));left:50%;transform:translateX(-50%);z-index:10;
  padding:4px 12px;border-radius:var(--radius-full);
  font-size:11px;color:rgba(255,255,255,0.3);
  cursor:pointer;transition:color .25s;
}
.logout-link:hover{color:rgba(255,255,255,0.7)}

/* ============================================
   PAGE 2 — BLACKBOARD
   ============================================ */
#view-blackboard{
  position:fixed;inset:0;z-index:30;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;
}

.blackboard-frame{
  width:min(88vw,380px);aspect-ratio:1;max-height:80vh;
  position:relative;
}

/* Wood frame */
.wood-frame{
  position:absolute;inset:-10px;border-radius:18px;
  background:linear-gradient(165deg,#7B5230 0%,#6B4226 20%,#5C3A20 40%,#6B4226 60%,#7B5230 80%,#6B4226 100%);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.06);
}
.wood-frame::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:repeating-linear-gradient(
    90deg,transparent,transparent 4px,rgba(0,0,0,0.03) 4px,rgba(0,0,0,0.03) 5px
  );
}

/* Chalkboard surface */
.blackboard-inner{
  position:absolute;inset:10px;border-radius:12px;
  background:
    radial-gradient(ellipse at 50% 30%,#3A5A3A 0%,var(--chalkboard) 60%,#1E301E 100%);
  display:flex;flex-direction:column;
  box-shadow:inset 0 2px 16px rgba(0,0,0,0.3);
  overflow:hidden;
}
.blackboard-inner::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  background-size:150px;border-radius:inherit;
}

.board-title{
  text-align:center;padding:14px 0 8px;
  font-size:13px;color:rgba(255,255,255,0.25);
  font-family:var(--font-display);letter-spacing:4px;
  position:relative;z-index:1;
}

/* Chalk messages */
.chalk-list{
  flex:1;padding:0 24px;overflow-y:auto;
  position:relative;z-index:1;
  scroll-behavior:smooth;
}
.chalk-msg{
  margin-bottom:16px;padding:6px 10px;
  border-radius:6px;position:relative;
  transition:background .2s;
}
.chalk-msg.erasable{
  border:1.5px dashed rgba(255,255,255,0.2);
  cursor:pointer;
}
.chalk-msg.erasable:hover{background:rgba(255,80,80,0.1)}
.chalk-text{
  display:block;
  font-family:var(--font-display);
  font-size:17px;line-height:1.7;letter-spacing:1px;
  text-shadow:0 1px 2px rgba(0,0,0,0.3);
  word-break:break-word;
}
.chalk-w{color:var(--chalk-w)}
.chalk-o{color:var(--chalk-o)}
.chalk-meta{display:flex;justify-content:space-between;margin-top:3px}
.chalk-author{font-size:11px;color:rgba(255,255,255,0.3)}
.chalk-time{font-size:10px;color:rgba(255,255,255,0.2)}
.erase-mark{
  position:absolute;top:-6px;right:-6px;
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,60,60,0.85);color:#FFF;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;box-shadow:0 2px 8px rgba(255,60,60,0.3);
}

/* Chalk toolbar */
.chalk-bar{
  display:flex;position:relative;z-index:1;
  border-top:1px solid rgba(255,255,255,0.08);
}
.chalk-tool{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:12px 0 14px;font-size:12px;color:rgba(255,255,255,0.45);
  transition:all .25s;
}
.chalk-tool:first-child{border-right:1px solid rgba(255,255,255,0.08)}
.chalk-tool.active{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9)}
.chalk-tool-emoji{font-size:20px;margin-bottom:2px}

/* Chalk write modal */
.chalk-modal-sheet{background:linear-gradient(165deg,#3D503D,#354535);border:2px solid rgba(255,255,255,0.1);color:#E8E0D0;margin:-28px -24px;border-radius:inherit;padding:28px 24px}
.chalk-modal-sheet .modal-title{color:#E8D8B0;font-family:var(--font-display)}
.chalk-modal-sheet .modal-textarea{background:rgba(0,0,0,0.2);color:#E8E0D0;border-color:rgba(255,255,255,0.1)}
.chalk-modal-sheet .modal-textarea:focus{border-color:rgba(255,255,255,0.25);background:rgba(0,0,0,0.3)}

/* ============================================
   PAGE 3 — PHOTO WALL
   ============================================ */
#view-photowall{
  position:fixed;inset:0;z-index:30;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;
}

.photo-wall-card{

// ----- Navigation -----
function navigateTo(view, pushStack = true) {
  const prev = document.querySelector('.view.active');
  const next = document.getElementById('view-' + view);
  if (!next || prev === next) return;

  if (prev) { prev.classList.add('fade-out'); prev.classList.remove('active'); }
  setTimeout(() => {
    if (prev) prev.classList.remove('fade-out');
    next.classList.add('active');
    window.scrollTo(0, 0);
    if (pushStack && S.currentView !== view) { S.viewStack.push(S.currentView); }
    S.currentView = view;
    // Lifecycle
    const hooks = {
      home:       () => { Home.onShow(); },
      blackboard: () => { Blackboard.onShow(); },
      photowall:  () => { Photowall.onShow(); },
      treehole:   () => { Treehole.onShow(); },
      'write-letter': () => { WriteLetter.onShow(); },
      'read-letters':() => { ReadLetters.onShow(); },
    };
    if (hooks[view]) hooks[view]();
  }, 40);
}

function goBack() {
  const prev = S.viewStack.pop();
  if (prev) navigateTo(prev, false);
}

// Global click delegation for navigation
document.getElementById('app').addEventListener('click', e => {
  const nav = e.target.closest('[data-nav]');
  if (nav) {
    const target = nav.dataset.nav;
    if (target === 'home') { S.viewStack = []; navigateTo('home', false); }
    else navigateTo(target);

// ============================================
// UTILITIES
// ============================================
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function relTime(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 3600000) { const m = Math.floor(diff/60000); return m <= 0 ? '刚刚' : m + '分钟前'; }
  if (diff < 86400000 && d.getDate() === now.getDate()) return '今天 ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  return fmtTime(ts);
}

function viewImage(url) {
  document.getElementById('photoPreviewSheet').innerHTML = `
    <img src="${url}" style="width:100%;max-height:70vh;object-fit:contain;border-radius:8px;display:block">
    <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:12px" onclick="document.getElementById('photoPreviewModal').classList.remove('open')">关闭</button>
  `;
  document.getElementById('photoPreviewModal').classList.add('open');
}

async function initSupabase() {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      S.session = session; S.userId = session.user.id;
      const { data: prof } = await supabase.from('profiles').select('*').eq('id', S.userId).single();
      if (prof) {
        S.myRole = prof.role; S.myName = prof.name; S.myEmoji = prof.emoji;
        S.myChalkColor = prof.role === 'rabbit' ? 'white' : 'orange';
        S.partnerId = prof.partner_id;
        if (prof.partner_id) {
          const { data: partner } = await supabase.from('profiles').select('*').eq('id', prof.partner_id).single();
          if (partner) { S.partnerName = partner.name; S.partnerEmoji = partner.emoji; }
        }
        navigateTo('home', false);
        return;
      }
    }
  } catch (e) {
    console.warn('Session check failed:', e);
  }
}

// Logout helper
function logout() {
  if (supabase) supabase.auth.signOut();
  S.session = null; S.userId = null;
  S.viewStack = [];
  Login.init();
  navigateTo('login', false);
}
</script>
